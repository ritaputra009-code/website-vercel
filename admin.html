<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Toko</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
.container{max-width:420px;margin:20px auto;background:white;padding:20px;border-radius:16px}
input,button{width:100%;padding:12px;margin-top:8px}
button{background:#ff4d00;color:white;border:none;font-weight:bold}
hr{margin:20px 0}
</style>
</head>

<body>

<div class="container">
<h3>Pengaturan Toko</h3>

<input id="namaToko" placeholder="Nama Toko">
<input id="waToko" placeholder="Nomor WhatsApp (628xxxx)">
<button onclick="simpanToko()">Simpan Pengaturan</button>

<hr>

<h3>Tambah Produk</h3>
<input id="namaProduk" placeholder="Nama Produk">
<input id="hargaProduk" placeholder="Harga">
<input type="file" id="gambarProduk" accept="image/*">
<button onclick="tambahProduk()">Tambah Produk</button>
</div>

<script>
/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_AUTH_DOMAIN",
  projectId: "ISI_PROJECT_ID",
  storageBucket: "ISI_STORAGE_BUCKET"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const docRef = db.collection("toko").doc("main");

/* ===== LOAD DATA TOKO ===== */
docRef.onSnapshot(doc=>{
  if(!doc.exists) return;
  const d = doc.data();
  namaToko.value = d.nama || "";
  waToko.value = d.wa || "";
});

/* ===== SIMPAN PENGATURAN ===== */
async function simpanToko(){
  const nama = namaToko.value.trim();
  const wa = waToko.value.trim();

  if(!nama){
    alert("Nama toko wajib diisi");
    return;
  }

  if(!/^62\d{8,13}$/.test(wa)){
    alert("Nomor WhatsApp harus format 62xxxxxxxxx");
    return;
  }

  await docRef.set({
    nama: nama,
    wa: wa,
    deskripsi: "Produk pilihan tersedia di sini"
  }, { merge:true });

  alert("Pengaturan toko disimpan ✅");
}

/* ===== TAMBAH PRODUK ===== */
async function tambahProduk(){
  const nama = namaProduk.value.trim();
  const harga = hargaProduk.value.trim();
  const file = gambarProduk.files[0];

  if(!nama || !harga || !file){
    alert("Lengkapi semua data produk");
    return;
  }

  try{
    const ref = storage.ref("produk/" + Date.now());
    await ref.put(file);
    const url = await ref.getDownloadURL();

    const snap = await docRef.get();
    let data = snap.exists ? snap.data() : { produk:[] };

    data.produk = data.produk || [];
    data.produk.push({
      nama: nama,
      harga: harga,
      gambar: url
    });

    await docRef.set({ produk: data.produk }, { merge:true });

    alert("Produk berhasil ditambahkan 🎉");
    namaProduk.value="";
    hargaProduk.value="";
    gambarProduk.value="";

  }catch(e){
    alert("Error: " + e.message);
  }
}
</script>

</body>
</html>
