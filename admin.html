<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f4f4}
.container{max-width:420px;margin:20px auto;background:#fff;padding:20px;border-radius:16px}
input,button{width:100%;padding:12px;margin-top:8px}
button{background:#ff4d00;color:#fff;border:none}
</style>
</head>

<body>

<div class="container">
<h3>Admin Panel</h3>
<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<input type="file" id="gambar">
<button onclick="tambah()">Tambah Produk</button>
</div>

<script>
firebase.initializeApp({
  apiKey: "ISI_PUNYA_KAMU",
  authDomain: "ISI",
  projectId: "ISI",
  storageBucket: "ISI",
});

const db = firebase.firestore();
const storage = firebase.storage();

async function tambah(){
  const file = gambar.files[0];
  if(!file) return alert("Pilih gambar");

  const ref = storage.ref("produk/"+Date.now());
  await ref.put(file);
  const url = await ref.getDownloadURL();

  const docRef = db.collection("toko").doc("main");
  const doc = await docRef.get();

  const data = doc.exists ? doc.data() : {
    nama:"LRM HOST",
    deskripsi:"Produk pilihan tersedia di sini",
    wa:"628xxxx",
    produk:[]
  };

  data.produk.push({
    nama:nama.value,
    harga:harga.value,
    gambar:url
  });

  await docRef.set(data);
  alert("Produk ditambahkan");
}
</script>

</body>
</html>
